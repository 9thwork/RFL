<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>직업상담사 2급 실기요약집</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root {
  --bg: #0d0f18;
  --surface: #141720;
  --surface2: #1c2030;
  --border: #252a3a;
  --accent: #c8f135;
  --accent2: #74b9ff;
  --accent3: #fd79a8;
  --accent4: #55efc4;
  --yellow: #ffeaa7;
  --text: #e8eaf0;
  --dim: #8890a8;
  --white: #ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  padding-bottom: 80px;
}

/* 헤더 */
.hdr {
  background: linear-gradient(135deg,#141720,#1a2035);
  border-bottom: 1px solid var(--border);
  padding: 16px 16px 12px;
  position: sticky; top:0; z-index:100;
}
.hdr-top { display:flex; justify-content:space-between; align-items:flex-start; }
.hdr h1 { font-size:18px; font-weight:900; color:var(--accent); line-height:1.3; }
.hdr p { font-size:12px; color:var(--dim); margin-top:3px; }
.total-badge {
  background:rgba(200,241,53,0.12);
  border:1px solid rgba(200,241,53,0.3);
  color:var(--accent);
  font-size:11px; font-weight:700;
  padding:3px 9px; border-radius:12px;
  white-space:nowrap; margin-left:8px; margin-top:2px;
}

/* 탭 */
.tabs {
  display:flex; gap:6px; overflow-x:auto; scrollbar-width:none;
  padding:10px 16px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky; top:66px; z-index:99;
}
.tabs::-webkit-scrollbar { display:none; }
.tab {
  flex-shrink:0;
  padding:7px 14px; border-radius:20px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--dim);
  font-family:'Noto Sans KR',sans-serif;
  font-size:13px; font-weight:600;
  cursor:pointer; transition:all 0.2s;
  white-space:nowrap;
}
.tab.on { background:var(--accent); border-color:var(--accent); color:#000; }
.tab:not(.on):active { border-color:var(--accent); color:var(--accent); }

/* 섹션 */
.sec { display:none; }
.sec.on { display:block; }

/* 섹션 상단 */
.sec-hdr {
  margin:16px 16px 0;
  padding:14px 18px;
  background:var(--surface);
  border-radius:12px;
  border-left:4px solid var(--accent);
  display:flex; justify-content:space-between; align-items:center;
}
.sec-hdr-left h2 { font-size:17px; font-weight:900; color:var(--white); }
.sec-hdr-left p { font-size:12px; color:var(--dim); margin-top:3px; }
.sec-count {
  font-size:22px; font-weight:900; color:var(--accent);
  text-align:right;
}
.sec-count span { display:block; font-size:10px; color:var(--dim); font-weight:400; }

/* 컨트롤 */
.ctrl { display:flex; gap:8px; padding:10px 16px 4px; }
.ctrl-btn {
  flex:1; padding:9px;
  border-radius:8px; border:1px solid var(--border);
  background:transparent; color:var(--dim);
  font-family:'Noto Sans KR',sans-serif;
  font-size:13px; font-weight:600;
  cursor:pointer; transition:all 0.2s;
}
.ctrl-btn:active { border-color:var(--accent); color:var(--accent); }

/* 검색 */
.search-wrap { padding:8px 16px 0; }
.search-input {
  width:100%; padding:11px 14px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  font-size:15px;
  outline:none;
  transition:border-color 0.2s;
}
.search-input:focus { border-color:var(--accent); }
.search-input::placeholder { color:var(--dim); }

/* 카드 리스트 */
.cards { padding:10px 16px; display:flex; flex-direction:column; gap:12px; }

/* 카드 */
.card {
  background:var(--surface);
  border-radius:14px;
  border:1px solid var(--border);
  overflow:hidden;
  transition:border-color 0.2s;
}
.card.highlight { border-color:rgba(200,241,53,0.5) !important; }

/* 카드 헤더 (클릭 영역) */
.card-hdr {
  padding:16px 16px 14px;
  cursor:pointer;
  display:flex; gap:12px; align-items:flex-start;
  user-select:none;
}
.card-num {
  flex-shrink:0;
  width:34px; height:34px;
  border-radius:50%;
  background:rgba(200,241,53,0.1);
  border:1.5px solid var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:900; color:var(--accent);
  margin-top:2px;
}
.card-main { flex:1; min-width:0; }
.card-tags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
.tag {
  font-size:11px; padding:2px 8px; border-radius:10px; font-weight:700;
}
.tag-y { background:rgba(255,234,167,0.1); color:var(--yellow); border:1px solid rgba(255,234,167,0.25); font-weight:500; }
.tag-ans { background:rgba(85,239,196,0.1); color:var(--accent4); border:1px solid rgba(85,239,196,0.3); }
.tag-noans { background:rgba(136,144,168,0.1); color:var(--dim); border:1px solid rgba(136,144,168,0.2); }
.card-q {
  font-size:16px; font-weight:700; color:var(--white);
  line-height:1.55; word-break:keep-all;
}
.card-arrow {
  flex-shrink:0; color:var(--dim); font-size:20px;
  transition:transform 0.25s; margin-top:4px;
  line-height:1;
}
.card.open .card-arrow { transform:rotate(180deg); }

/* 답안 영역 */
.card-ans {
  display:none;
  padding:0 16px 16px;
  border-top:1px solid var(--border);
}
.card.open .card-ans { display:block; }
.ans-lbl {
  font-size:11px; font-weight:700; color:var(--accent);
  letter-spacing:1.5px; padding:12px 0 10px;
}
.ans-body {
  font-size:15px; line-height:1.75;
  color:var(--text);
  white-space:pre-wrap;
  word-break:keep-all;
}
/* 답안 내 강조 */
.ans-body .circle-num {
  color:var(--accent); font-weight:700;
}
.note-box {
  margin-top:10px; padding:10px 14px;
  background:rgba(116,185,255,0.07);
  border:1px solid rgba(116,185,255,0.2);
  border-radius:8px;
  font-size:13px; color:var(--accent2);
  line-height:1.6;
}
.note-box b { color:var(--white); }

/* 빈 답안 안내 */
.no-ans-notice {
  margin-top:8px; padding:10px 14px;
  background:rgba(136,144,168,0.08);
  border:1px dashed var(--border);
  border-radius:8px;
  font-size:13px; color:var(--dim);
  line-height:1.6;
}

/* 결과없음 */
.empty {
  text-align:center; padding:40px 20px;
  color:var(--dim); font-size:15px;
}

/* FAB */
.fab {
  position:fixed; bottom:20px; right:16px;
  width:48px; height:48px; border-radius:50%;
  background:var(--accent); border:none;
  color:#000; font-size:22px; font-weight:900;
  cursor:pointer; box-shadow:0 4px 20px rgba(200,241,53,0.4);
  display:flex; align-items:center; justify-content:center;
  z-index:200;
  transition:transform 0.2s;
}
.fab:active { transform:scale(0.92); }

/* 진행 카운터 */
.prog {
  display:flex; align-items:center; gap:10px;
  padding:6px 16px 0;
}
.prog-bar {
  flex:1; height:3px; background:var(--border); border-radius:2px; overflow:hidden;
}
.prog-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.3s; }
.prog-txt { font-size:11px; color:var(--dim); white-space:nowrap; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div>
      <h1>📋 직업상담사 2급 실기요약집</h1>
      <p>기출문제 분석 · 출제빈도순 정리</p>
    </div>
    <div class="total-badge">총 250문제</div>
  </div>
</div>

<div class="tabs" id="tabs">
  <button class="tab on" onclick="switchTab('t5',this)">🔴 5회이상 <b>14</b></button>
  <button class="tab" onclick="switchTab('t4',this)">🟠 4회 <b>12</b></button>
  <button class="tab" onclick="switchTab('t3',this)">🟡 3회 <b>31</b></button>
  <button class="tab" onclick="switchTab('t2',this)">📋 2회 <b>56</b></button>
  <button class="tab" onclick="switchTab('t1',this)">📝 1회 <b>118</b></button>
  <button class="tab" onclick="switchTab('tc',this)">🔢 계산 <b>19</b></button>
</div>

<div id="t5" class="sec on">
  <div class="sec-hdr">
    <div class="sec-hdr-left">

<div id="t3" class="sec">

<div id="t2" class="sec">
  <div class="sec-hdr">
    <div class="sec-hdr-left">
      <h2>2회 출제</h2>
      <p>참고용</p>
    </div>
    <div class="sec-count">56<span>문제</span></div>
  </div>
  <div class="ctrl">
    <button class="ctrl-btn" onclick="expandAll('t2')">▼ 전체 열기</button>

<div id="t1" class="sec">
  <div class="sec-hdr">

      <h2>1회 출제</h2>

<div id="tc" class="sec">
  <div class="sec-hdr">
    <div class="sec-hdr-left">
      <h2>계산문제 모음</h2>
      <p>공식 + 계산과정 포함</p>

    <button class="ctrl-btn" onclick="expandAll('tc')">▼ 전체 열기</button>

  <div class="cards" id="cards-tc"></div>
</div>

<button class="fab" onclick="scrollTop()">↑</button>

<script>
/* ── 데이터 ── */
const DATA = {
  t5: [
    {num:'001',years:'23-3/22-1/21-1/20-3/19-2/18-2/16-1',q:'홀랜드 직업흥미검사의 6가지 유형을 쓰고 설명하시오',a:`① 현실형(R): 기계와 도구 조작을 좋아함 — 농부, 기술자
② 탐구형(I): 관찰·연구를 선호함 — 과학자, 연구원
③ 예술형(A): 표현이 풍부하고 창의적임 — 예술가, 연예인
④ 사회형(S): 대인관계에 능숙함 — 교사, 상담가
⑤ 진취형(E): 리더십이 있음 — 정치가, 사업가
⑥ 관습형(C): 체계적인 정리에 능숙함 — 공무원, 은행원`},
    {num:'002',years:'24-2/23-3/22-1/21-2/20-1/19-1/18-3',q:'집단 내 규준 3가지를 쓰고 설명하시오',a:`① 백분위 점수: 원점수를 백분율로 표시하여 개인의 상대적 위치를 나타냄
② 표준 점수: 원점수가 평균에서 얼마나 떨어져 있는지 표준편차 단위로 나타냄
③ 표준 등급(스테나인): 원점수를 1~9등급으로 나누어 표시`},
    {num:'003',years:'24-3/22-3/21-3/21-1/20-2/17-2/17-1',q:'부처의 집단 직업상담 3단계 모델을 쓰고 설명하시오',a:`① 탐색 단계: 자기개방, 흥미와 적성 탐색, 탐색결과 피드백
② 전환 단계: 자신의 지식을 직업세계와 연결
③ 행동 단계: 목표 달성을 위한 행동 수행`},
    {num:'004',years:'24-3/23-3/23-1/21-3/20-3/16-2',q:'한국 표준산업분류에서 산업 결정방법(결정 원칙) 4가지를 쓰시오',a:`① 생산단위의 산업활동은 주된 산업활동의 종류에 따라 결정
② 적합하지 않을 경우 종업원 수, 노동시간, 임금, 설비 정도에 의해 결정
③ 계절에 따라 산업이 달라질 경우 조사 기간 동안 산출액이 가장 큰 산업으로 결정
④ 설립 중이거나 청산 중인 사업체는 설립 후 개시 또는 청산 전 산업으로 결정`},
    {num:'005',years:'21-3/21-1/19-2/18-3/16-3/16-1',q:'규준참조검사와 준거참조검사의 의미, 예시, 차이점을 쓰시오',a:`규준 참조 검사
- 의미: 개인 점수를 다른 사람과 비교하여 평가
- 예시: 심리검사
준거 참조 검사
- 의미: 개인 점수를 기준 점수와 비교하여 평가
- 예시: 국가자격시험
차이점
① 규준 참조 검사는 다른 사람과 비교
② 준거 참조 검사는 기준 점수와 비교`},
    {num:'006',years:'24-2/24-1/22-2/20-2/20-1/18-3',q:'산업, 산업활동, 산업활동의 범위, 산업분류, 통계 단위의 정의를 쓰시오',a:`① 산업 — 유사 산업활동에 종사하는 생산단위의 집합
② 산업활동 — 각 생산 단위가 노동, 자본, 자원 등을 투입하여 재화 또는 서비스를 생산·제공하는 과정
③ 산업활동의 범위 — 영리·비영리적 활동 (가사활동 제외)
④ 산업분류 — 생산단위의 생산활동을 유사성에 따라 체계적으로 분류
⑤ 통계 단위 — 통계 작성을 위해 정보를 수집하고 분석하는 대상`},
    {num:'007',years:'24-2/22-3/19-1/17-3/16-3',q:'직무분석방법 중 최초 분석법(방법)의 4가지를 쓰고 설명하시오',a:`① 체험법 — 직무 분석자가 직접 직무를 체험하여 자료를 얻는 방법
② 면접법 — 직무 분석자가 직무 담당자와 면접을 진행하여 자료를 얻는 방법
③ 설문지법 — 직무 담당자가 설문지를 작성하도록 하여 자료를 얻는 방법

/* ── 파싱 ── */
function parseRaw(raw) {
  return raw.trim().split('\n').filter(l => l.trim()).map(line => {
    const parts = line.split('|');
    if (parts.length >= 4) {
      return { num: parts[0], years: parts[1], q: parts[2], a: parts[3] };
    }
    return null;
  }).filter(Boolean);
}

/* ── 렌더 ── */
const openedSets = { t5: new Set(), t4: new Set(), t3: new Set(), t2: new Set(), t1: new Set(), tc: new Set() };

function renderCard(item, tabId) {
  const id = `${tabId}-${item.num}`;
  const hasAns = item.a && item.a.trim().length > 10;
  const countY = (item.years.match(/\//g)||[]).length + 1;

  let ansHtml = '';
  if (hasAns) {
    const lines = item.a.split('\n');
    const formatted = lines.map(l => {
      l = l.replace(/([①②③④⑤⑥⑦⑧⑨⑩])/g, '<span class="circle-num">$1</span>');
      return `<div>${l}</div>`;
    }).join('');
    ansHtml = `<div class="ans-lbl">✦ 모범 답안</div><div class="ans-body">${formatted}</div>`;
  } else {
    ansHtml = `<div class="ans-lbl">✦ 모범 답안</div><div class="no-ans-notice">📎 해당 문제의 답안은 원본 PDF를 직접 확인하세요.<br>출제연도를 참고하여 기출 패턴을 파악하세요.</div>`;
  }

  return `
<div class="card" id="card-${id}">
  <div class="card-hdr" onclick="toggleCard('${id}','${tabId}')">
    <div class="card-num">${parseInt(item.num)}</div>
    <div class="card-main">
      <div class="card-tags">
        <span class="tag tag-y">${item.years}</span>
        ${hasAns ? `<span class="tag tag-ans">✓ 답안있음</span>` : `<span class="tag tag-noans">참조필요</span>`}
      </div>
      <div class="card-q">${item.q}</div>
    </div>
    <div class="card-arrow">⌄</div>
  </div>
  <div class="card-ans">${ansHtml}</div>
</div>`;
}

function renderSection(tabId, items) {
  const container = document.getElementById(`cards-${tabId}`);
  if (!container) return;
  container.innerHTML = items.map(item => renderCard(item, tabId)).join('');
}

/* ── 토글 ── */
function toggleCard(id, tabId) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  const wasOpen = card.classList.contains('open');
  card.classList.toggle('open');
  if (!wasOpen) {
    openedSets[tabId].add(id);
  }
  updateProgress(tabId);
}

function expandAll(tabId) {
  document.querySelectorAll(`#cards-${tabId} .card`).forEach(c => {
    c.classList.add('open');
    openedSets[tabId].add(c.id.replace('card-',''));
  });
  updateProgress(tabId);
}

function collapseAll(tabId) {
  document.querySelectorAll(`#cards-${tabId} .card`).forEach(c => c.classList.remove('open'));
}

/* ── 진행도 ── */
function updateProgress(tabId) {
  const total = document.querySelectorAll(`#cards-${tabId} .card`).length;
  const opened = openedSets[tabId].size;
  const pct = total > 0 ? Math.round(opened/total*100) : 0;
  const fill = document.getElementById(`prog-${tabId}`);
  const txt = document.getElementById(`prog-txt-${tabId}`);
  if (fill) fill.style.width = pct + '%';
  if (txt) txt.textContent = `${opened} / ${total} 열람`;
}

/* ── 검색 ── */
function filterCards(tabId, query) {
  const q = query.trim().toLowerCase();
  document.querySelectorAll(`#cards-${tabId} .card`).forEach(card => {
    const txt = card.textContent.toLowerCase();
    const visible = !q || txt.includes(q);
    card.style.display = visible ? '' : 'none';
    if (visible && q) card.classList.add('highlight');
    else card.classList.remove('highlight');
  });
}

/* ── 탭 전환 ── */
function switchTab(tabId, btn) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  document.getElementById(tabId).classList.add('on');
  btn.classList.add('on');
  scrollTop();
}

function scrollTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
